<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Slideshow</title>
    <!-- Optional: Link to a CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slideshow-container">
        <!-- Full-width images with number text and caption text -->
        <!-- The actual image will be inserted and managed by JavaScript -->
        <img id="slideshow-img" src="" alt="Slideshow image">

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <!-- JavaScript file link -->
    <script src="question23.js"></script>

</body>
</html>
